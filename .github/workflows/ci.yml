name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build example
        run: pnpm run build:example

      - name: Check example
        run: pnpm run check:example

      - name: Pack adapter
        run: pnpm --filter sveltekit-adapter-twitch-extension pack && rm -f sveltekit-adapter-twitch-extension-*.tgz
